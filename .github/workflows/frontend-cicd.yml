name: Frontend CI/CD

on:
push:
branches: [main]
pull_request:
branches: [main]

env:
DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/lms-frontend

jobs:
security-and-build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: "18"

  - name: Install dependencies
    run: npm install

  - name: Build frontend
    run: npm run build

  - name: SonarCloud Scan
    uses: SonarSource/sonarqube-scan-action@v6
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  - name: Run Snyk Test
    uses: snyk/actions/node@master
    continue-on-error: true
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  - name: Upload results to Snyk Dashboard
    run: |
      npm install -g snyk
      snyk monitor
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  - name: Login to DockerHub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  - name: Build and push Docker image
    uses: docker/build-push-action@v5
    with:
      context: .
      push: true
      build-args: |
        REACT_APP_API_URL=http://${{ secrets.SERVER_IP }}
      tags: ${{ env.DOCKER_IMAGE }}:latest
```

deploy:
needs: security-and-build
runs-on: ubuntu-latest
if: github.ref == 'refs/heads/main'

```
permissions:
  contents: read
  issues: write
  pull-requests: write

steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Setup SSH
    run: |
      mkdir -p ~/.ssh
      echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
      chmod 600 ~/.ssh/id_ed25519
      ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

  - name: Deploy frontend container
    run: |
      ssh -i ~/.ssh/id_ed25519 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
        docker-compose pull frontend
        docker-compose up -d --no-deps frontend
      "

  - name: Wait for frontend to be ready
    run: |
      echo "Waiting for frontend to start..."
      for i in {1..30}; do
        if curl -s http://${{ secrets.SERVER_IP }} >/dev/null; then
          echo "Frontend is up!"
          break
        fi
        sleep 2
      done

  - name: Run ZAP on VM
    run: |
      ssh -i ~/.ssh/id_ed25519 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
        docker pull ghcr.io/zaproxy/zaproxy:stable
        docker run --rm -v /tmp:/zap/wrk -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
          -t http://${{ secrets.SERVER_IP }} \
          -r zap_report_frontend.html \
          -I -d
      "

  - name: Download ZAP report
    run: |
      scp -i ~/.ssh/id_ed25519 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/tmp/zap_report_frontend.html ./zap_report_frontend.html

  - name: Upload ZAP Reports
    uses: actions/upload-artifact@v4
    with:
      name: zap-reports-frontend
      path: zap_report_frontend.html
```

